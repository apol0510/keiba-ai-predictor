name: Daily AI Prediction Automation

on:
  schedule:
    # 毎日 14:00 JST (05:00 UTC) に実行
    - cron: '0 5 * * *'

  workflow_dispatch:  # 手動実行も可能

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies (ffmpeg, fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-automation.txt

      - name: Create credentials directory
        run: mkdir -p credentials

      - name: Restore YouTube credentials from secrets
        env:
          YOUTUBE_CREDENTIALS_JSON: ${{ secrets.YOUTUBE_CREDENTIALS_JSON }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          printf '%s' "$YOUTUBE_CREDENTIALS_JSON" > credentials/youtube_credentials.json
          printf '%s' "$YOUTUBE_TOKEN_JSON" > credentials/youtube_token.json

      - name: Run daily automation
        env:
          PYTHONUNBUFFERED: '1'
          API_BASE_URL: 'https://keiba-ai-predictor.onrender.com'
          YOUTUBE_TOKEN_PATH: 'credentials/youtube_token.json'
          YOUTUBE_PRIVACY: 'private'
          TARGET_TRACK: 'nankan'
          RUN_MODE: 'prod'
        run: |
          python src/automation/run_daily.py

      - name: Upload generated files as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-prediction-${{ github.run_number }}
          path: |
            output/*.md
            output/*.mp4
          retention-days: 7

      - name: Commit automation state
        if: ${{ github.event_name == 'schedule' }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          if [ -f automation_state.json ]; then
            git add automation_state.json
            git commit -m "🤖 投稿状態を更新: $(date +'%Y-%m-%d')" || true
            git push || true
          fi
        continue-on-error: true

      - name: Notify completion (optional)
        if: ${{ secrets.WEBHOOK_URL }}
        run: |
          curl -X POST ${{ secrets.WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{"text":"✅ 競馬AI予想: 本日の自動化完了"}'
        continue-on-error: true
