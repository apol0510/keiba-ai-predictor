name: Docker Build Test

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches-ignore:
      - main
      - master

jobs:
  test:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: keiba-ai-predictor:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        run: |
          docker run -d \
            --name keiba-ai-test \
            -p 8000:8000 \
            keiba-ai-predictor:test

      - name: Wait for service
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'

      - name: Health Check
        run: |
          curl -f http://localhost:8000/health || exit 1
          echo "Health check passed!"

      - name: Test API
        run: |
          curl -f http://localhost:8000/ || exit 1
          echo "API test passed!"

      - name: Show logs
        if: always()
        run: |
          docker logs keiba-ai-test

      - name: Clean up
        if: always()
        run: |
          docker stop keiba-ai-test || true
          docker rm keiba-ai-test || true
