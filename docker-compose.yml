version: '3.8'

services:
  # 競馬予想API
  keiba-ai-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keiba-ai-predictor
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - LOG_LEVEL=info
    volumes:
      # モデルファイルをマウント（本番では不要、イメージに含める）
      - ./models:/app/models:ro
    restart: unless-stopped
    networks:
      - keiba-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx (リバースプロキシ・負荷分散)
  nginx:
    image: nginx:alpine
    container_name: keiba-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - keiba-ai-api
    restart: unless-stopped
    networks:
      - keiba-network

networks:
  keiba-network:
    driver: bridge
